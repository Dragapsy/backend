services:
  postgres:
    image: postgres:16-alpine
    container_name: storyngo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-storyngo}
      POSTGRES_USER: ${POSTGRES_USER:-storyngo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storyngo_pwd}
    ports:
      - "5432:5432"
    volumes:
      - storyngo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-storyngo} -d ${POSTGRES_DB:-storyngo}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  storyngo_postgres_data:
