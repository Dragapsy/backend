spring.application.name=StorynGo

# Configuration principale - PostgreSQL (base reelle)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/storyngo}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:storyngo}
spring.datasource.password=${DB_PASSWORD:storyngo_pwd}

# Configuration JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
spring.jpa.show-sql=true

# Profil H2 optionnel: utiliser `dev` si necessaire
spring.h2.console.enabled=false

# Configuration JWT
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=3600000

# Configuration CORS (patterns d'origines autorises, separes par des virgules)
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*
