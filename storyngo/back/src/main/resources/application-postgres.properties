spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/storyngo}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:storyngo}
spring.datasource.password=${DB_PASSWORD:storyngo_pwd}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=never

# JWT secret reste obligatoire (utilise dans application.properties)
