spring.application.name=StorynGo

# Configuration par defaut - Base de donnees H2 en memoire
spring.datasource.url=jdbc:h2:mem:storyngo;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuration JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.show-sql=true

# Configuration H2 Console (optionnel, pour le debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuration JWT
security.jwt.secret=change-this-secret-to-32-bytes-minimum
security.jwt.expiration-ms=3600000

# Configuration CORS (origines frontend autorisees, separees par des virgules)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
